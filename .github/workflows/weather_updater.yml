name: Update Live Weather Cat Image

on:
  schedule:
    - cron: '0 * * * *' # Runs automatically every hour
  workflow_dispatch: # Allows you to trigger it manually via the GitHub UI

# --- FIXES EXIT CODE 128 ---
# Grant the GitHub Actions runner permission to commit and push changes back to the repo
permissions:
  contents: write

jobs:
  update-weather:
    runs-on: ubuntu-latest
    
    # --- SILENCES NODE.JS 20 DEPRECATION WARNING ---
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Weather Updater
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python weather_viewer.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add images/current_weather.svg
          
          # Only commit and push if the image actually changed
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated update of current_weather.svg"
            git push origin main
          else
            echo "No changes detected in weather state. Skipping push."
          fi
