<svg viewBox="0 0 800 480" width="800" height="480" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky background -->
  <rect width="800" height="480" fill="#FFD700"/>
  <!-- Ground -->
  <rect x="0" y="360" width="800" height="120" fill="#E8A020"/>

  <!-- Sun -->
  <circle cx="660" cy="90" r="65" fill="#FFEC00" stroke="#FF8C00" stroke-width="5"/>
  <!-- Sun rays -->
  <g stroke="#FF8C00" stroke-width="5" stroke-linecap="round">
    <line x1="660" y1="5" x2="660" y2="25"/>
    <line x1="660" y1="155" x2="660" y2="175"/>
    <line x1="575" y1="90" x2="555" y2="90"/>
    <line x1="745" y1="90" x2="765" y2="90"/>
    <line x1="600" y1="30" x2="585" y2="15"/>
    <line x1="720" y1="150" x2="735" y2="165"/>
    <line x1="720" y1="30" x2="735" y2="15"/>
    <line x1="600" y1="150" x2="585" y2="165"/>
  </g>

  <!-- Heat wavy lines -->
  <path d="M100 340 Q120 320 140 340 Q160 360 180 340" stroke="#FF6600" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M200 340 Q220 320 240 340 Q260 360 280 340" stroke="#FF6600" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M550 340 Q570 320 590 340 Q610 360 630 340" stroke="#FF6600" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M630 340 Q650 320 670 340 Q690 360 710 340" stroke="#FF6600" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Cat body -->
  <ellipse cx="370" cy="310" rx="105" ry="90" fill="#FF7A2F" stroke="#222" stroke-width="4"/>
  <!-- Cat head -->
  <circle cx="370" cy="185" r="80" fill="#FF7A2F" stroke="#222" stroke-width="4"/>

  <!-- Ears -->
  <polygon points="300,130 320,80 350,130" fill="#FF7A2F" stroke="#222" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="390,130 420,80 440,130" fill="#FF7A2F" stroke="#222" stroke-width="4" stroke-linejoin="round"/>
  <!-- Inner ears -->
  <polygon points="308,125 322,90 345,125" fill="#FF4444"/>
  <polygon points="395,125 418,90 435,125" fill="#FF4444"/>

  <!-- Eyes - squinting from heat -->
  <path d="M330 185 Q345 172 360 185" stroke="#222" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M380 185 Q395 172 410 185" stroke="#222" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="370" cy="205" rx="10" ry="7" fill="#FF4488"/>
  <!-- Mouth -->
  <path d="M362 212 Q370 222 378 212" stroke="#222" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Tongue out (hot!) -->
  <ellipse cx="370" cy="224" rx="12" ry="10" fill="#FF4444"/>
  <line x1="370" y1="222" x2="370" y2="228" stroke="#CC2222" stroke-width="2"/>

  <!-- Whiskers -->
  <line x1="300" y1="200" x2="360" y2="205" stroke="#444" stroke-width="2.5"/>
  <line x1="300" y1="212" x2="360" y2="210" stroke="#444" stroke-width="2.5"/>
  <line x1="380" y1="205" x2="440" y2="200" stroke="#444" stroke-width="2.5"/>
  <line x1="380" y1="210" x2="440" y2="212" stroke="#444" stroke-width="2.5"/>

  <!-- Cat front legs -->
  <ellipse cx="315" cy="385" rx="30" ry="18" fill="#FF7A2F" stroke="#222" stroke-width="4"/>
  <ellipse cx="425" cy="385" rx="30" ry="18" fill="#FF7A2F" stroke="#222" stroke-width="4"/>
  <!-- Toe lines -->
  <line x1="307" y1="393" x2="307" y2="399" stroke="#222" stroke-width="2"/>
  <line x1="315" y1="395" x2="315" y2="401" stroke="#222" stroke-width="2"/>
  <line x1="323" y1="393" x2="323" y2="399" stroke="#222" stroke-width="2"/>
  <line x1="417" y1="393" x2="417" y2="399" stroke="#222" stroke-width="2"/>
  <line x1="425" y1="395" x2="425" y2="401" stroke="#222" stroke-width="2"/>
  <line x1="433" y1="393" x2="433" y2="399" stroke="#222" stroke-width="2"/>

  <!-- Tail curled lazily -->
  <path d="M470 330 Q530 280 540 350 Q550 400 500 410" stroke="#FF7A2F" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M470 330 Q530 280 540 350 Q550 400 500 410" stroke="#222" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="none" fill-opacity="0"/>

  <!-- Sweat drop -->
  <ellipse cx="420" cy="155" rx="8" ry="12" fill="#3399FF"/>
  <polygon points="412,155 428,155 420,140" fill="#3399FF"/>

  <!-- Stripe markings -->
  <path d="M340 230 Q360 240 380 230" stroke="#CC5500" stroke-width="3" fill="none"/>
  <path d="M350 270 Q370 280 390 270" stroke="#CC5500" stroke-width="3" fill="none"/>
</svg>
