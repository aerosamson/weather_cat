<svg viewBox="0 0 800 480" width="800" height="480" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky background - cold pale blue -->
  <rect width="800" height="480" fill="#C8E0F4"/>
  <!-- Ground -->
  <rect x="0" y="370" width="800" height="110" fill="#E0F0FF"/>
  <!-- Ground texture (frost) -->
  <rect x="0" y="368" width="800" height="6" fill="#B8D8F0"/>

  <!-- Bare trees left -->
  <line x1="80" y1="370" x2="80" y2="200" stroke="#555" stroke-width="8"/>
  <line x1="80" y1="280" x2="40" y2="220" stroke="#555" stroke-width="5"/>
  <line x1="80" y1="280" x2="120" y2="230" stroke="#555" stroke-width="5"/>
  <line x1="80" y1="240" x2="50" y2="200" stroke="#555" stroke-width="3"/>
  <line x1="80" y1="240" x2="110" y2="195" stroke="#555" stroke-width="3"/>

  <!-- Bare trees right -->
  <line x1="710" y1="370" x2="710" y2="200" stroke="#555" stroke-width="8"/>
  <line x1="710" y1="290" x2="670" y2="230" stroke="#555" stroke-width="5"/>
  <line x1="710" y1="290" x2="750" y2="240" stroke="#555" stroke-width="5"/>
  <line x1="710" y1="245" x2="680" y2="205" stroke="#555" stroke-width="3"/>
  <line x1="710" y1="245" x2="738" y2="200" stroke="#555" stroke-width="3"/>

  <!-- Cat body - puffed up for warmth -->
  <ellipse cx="390" cy="315" rx="130" ry="105" fill="#FF7A2F" stroke="#222" stroke-width="4"/>
  <!-- Cat head -->
  <circle cx="390" cy="185" r="90" fill="#FF7A2F" stroke="#222" stroke-width="4"/>

  <!-- Ears -->
  <polygon points="315,138 332,82 368,138" fill="#FF7A2F" stroke="#222" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="412,138 448,82 465,138" fill="#FF7A2F" stroke="#222" stroke-width="4" stroke-linejoin="round"/>
  <!-- Inner ears -->
  <polygon points="324,132 336,94 362,132" fill="#FF4444"/>
  <polygon points="418,132 444,94 458,132" fill="#FF4444"/>

  <!-- Scarf! -->
  <rect x="285" y="255" width="210" height="30" rx="12" fill="#DD0000" stroke="#AA0000" stroke-width="2"/>
  <!-- Scarf stripes -->
  <rect x="305" y="255" width="15" height="30" rx="0" fill="#FF3333" opacity="0.5"/>
  <rect x="340" y="255" width="15" height="30" rx="0" fill="#FF3333" opacity="0.5"/>
  <rect x="375" y="255" width="15" height="30" rx="0" fill="#FF3333" opacity="0.5"/>
  <rect x="410" y="255" width="15" height="30" rx="0" fill="#FF3333" opacity="0.5"/>
  <rect x="445" y="255" width="15" height="30" rx="0" fill="#FF3333" opacity="0.5"/>
  <!-- Scarf knot -->
  <ellipse cx="350" cy="270" rx="25" ry="20" fill="#CC0000" stroke="#AA0000" stroke-width="2"/>
  <!-- Scarf dangles -->
  <rect x="320" y="280" width="12" height="55" rx="6" fill="#DD0000"/>
  <rect x="340" y="280" width="12" height="45" rx="6" fill="#CC0000"/>

  <!-- Eyes - wide and alert in cold -->
  <ellipse cx="353" cy="180" rx="22" ry="22" fill="#FFD700" stroke="#222" stroke-width="3"/>
  <ellipse cx="427" cy="180" rx="22" ry="22" fill="#FFD700" stroke="#222" stroke-width="3"/>
  <circle cx="358" cy="182" r="12" fill="#111"/>
  <circle cx="432" cy="182" r="12" fill="#111"/>
  <circle cx="363" cy="176" r="4" fill="white"/>
  <circle cx="437" cy="176" r="4" fill="white"/>

  <!-- Nose -->
  <ellipse cx="390" cy="208" rx="11" ry="8" fill="#FF4488"/>
  <!-- Chilly mouth -->
  <path d="M381 218 Q390 214 399 218" stroke="#222" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="310" y1="204" x2="375" y2="210" stroke="#444" stroke-width="2.5"/>
  <line x1="308" y1="216" x2="375" y2="215" stroke="#444" stroke-width="2.5"/>
  <line x1="405" y1="210" x2="470" y2="204" stroke="#444" stroke-width="2.5"/>
  <line x1="405" y1="215" x2="472" y2="216" stroke="#444" stroke-width="2.5"/>

  <!-- Breath cloud -->
  <circle cx="440" cy="238" r="10" fill="white" opacity="0.9"/>
  <circle cx="455" cy="230" r="13" fill="white" opacity="0.85"/>
  <circle cx="472" cy="224" r="10" fill="white" opacity="0.7"/>
  <circle cx="487" cy="218" r="7" fill="white" opacity="0.5"/>

  <!-- Tucked in paws -->
  <ellipse cx="330" cy="400" rx="32" ry="16" fill="#FF7A2F" stroke="#222" stroke-width="3"/>
  <ellipse cx="450" cy="400" rx="32" ry="16" fill="#FF7A2F" stroke="#222" stroke-width="3"/>
  <!-- Toe lines -->
  <line x1="322" y1="407" x2="322" y2="412" stroke="#222" stroke-width="2"/>
  <line x1="330" y1="409" x2="330" y2="414" stroke="#222" stroke-width="2"/>
  <line x1="338" y1="407" x2="338" y2="412" stroke="#222" stroke-width="2"/>
  <line x1="442" y1="407" x2="442" y2="412" stroke="#222" stroke-width="2"/>
  <line x1="450" y1="409" x2="450" y2="414" stroke="#222" stroke-width="2"/>
  <line x1="458" y1="407" x2="458" y2="412" stroke="#222" stroke-width="2"/>

  <!-- Tail tucked around body -->
  <path d="M510 320 Q570 380 500 410 Q440 430 390 415" stroke="#FF7A2F" stroke-width="18" fill="none" stroke-linecap="round"/>

  <!-- Frost/ice crystals -->
  <!-- Crystal 1 -->
  <g transform="translate(160, 420)">
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#88BBDD" stroke-width="2"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#88BBDD" stroke-width="2"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#88BBDD" stroke-width="2"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#88BBDD" stroke-width="2"/>
  </g>
  <!-- Crystal 2 -->
  <g transform="translate(600, 415)">
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#88BBDD" stroke-width="2"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#88BBDD" stroke-width="2"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#88BBDD" stroke-width="2"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#88BBDD" stroke-width="2"/>
  </g>
  <!-- Crystal 3 -->
  <g transform="translate(230, 440)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#88BBDD" stroke-width="2"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#88BBDD" stroke-width="2"/>
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="#88BBDD" stroke-width="2"/>
    <line x1="7" y1="-7" x2="-7" y2="7" stroke="#88BBDD" stroke-width="2"/>
  </g>
  <!-- Crystal 4 -->
  <g transform="translate(560, 440)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#88BBDD" stroke-width="2"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#88BBDD" stroke-width="2"/>
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="#88BBDD" stroke-width="2"/>
    <line x1="7" y1="-7" x2="-7" y2="7" stroke="#88BBDD" stroke-width="2"/>
  </g>
</svg>
