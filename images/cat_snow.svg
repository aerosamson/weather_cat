<svg viewBox="0 0 800 480" width="800" height="480" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky background - deep cold blue-grey -->
  <rect width="800" height="480" fill="#8BAAC4"/>

  <!-- Snowy ground -->
  <ellipse cx="400" cy="470" rx="500" ry="130" fill="white"/>
  <rect x="0" y="390" width="800" height="90" fill="white"/>
  <!-- Snow hills -->
  <ellipse cx="120" cy="392" rx="160" ry="40" fill="white"/>
  <ellipse cx="670" cy="395" rx="170" ry="38" fill="white"/>

  <!-- Snow on trees -->
  <!-- Left tree -->
  <rect x="75" y="180" width="12" height="220" fill="#6B4C36"/>
  <polygon points="30,290 137,290 83,155" fill="#2D7A3A"/>
  <polygon points="40,250 130,250 85,130" fill="#2D7A3A"/>
  <!-- Snow caps -->
  <polygon points="35,290 125,290 80,265" fill="white"/>
  <polygon points="42,250 122,250 82,228" fill="white"/>
  <polygon points="47,235 117,235 82,185" fill="white"/>

  <!-- Right tree -->
  <rect x="693" y="180" width="12" height="220" fill="#6B4C36"/>
  <polygon points="648,290 757,290 702,155" fill="#2D7A3A"/>
  <polygon points="658,250 750,250 704,130" fill="#2D7A3A"/>
  <!-- Snow caps -->
  <polygon points="653,290 743,290 698,265" fill="white"/>
  <polygon points="660,250 742,250 701,228" fill="white"/>
  <polygon points="665,235 737,235 701,185" fill="white"/>

  <!-- Snowflakes falling -->
  <!-- Snowflake 1 -->
  <g transform="translate(155, 60)">
    <line x1="0" y1="-12" x2="0" y2="12" stroke="white" stroke-width="2.5"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="white" stroke-width="2.5"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="white" stroke-width="2.5"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="white" stroke-width="2.5"/>
  </g>
  <!-- Snowflake 2 -->
  <g transform="translate(250, 100)">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="white" stroke-width="2"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="white" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="white" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="white" stroke-width="2"/>
  </g>
  <!-- Snowflake 3 -->
  <g transform="translate(200, 140)">
    <line x1="0" y1="-7" x2="0" y2="7" stroke="white" stroke-width="2"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="white" stroke-width="2"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="white" stroke-width="2"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="white" stroke-width="2"/>
  </g>
  <!-- Snowflake 4 -->
  <g transform="translate(560, 70)">
    <line x1="0" y1="-12" x2="0" y2="12" stroke="white" stroke-width="2.5"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="white" stroke-width="2.5"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="white" stroke-width="2.5"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="white" stroke-width="2.5"/>
  </g>
  <!-- Snowflake 5 -->
  <g transform="translate(620, 120)">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="white" stroke-width="2"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="white" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="white" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="white" stroke-width="2"/>
  </g>
  <!-- Snowflake 6 -->
  <g transform="translate(490, 90)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="white" stroke-width="2"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="white" stroke-width="2"/>
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="white" stroke-width="2"/>
    <line x1="7" y1="-7" x2="-7" y2="7" stroke="white" stroke-width="2"/>
  </g>
  <!-- Extra small snowflakes -->
  <circle cx="340" cy="55" r="3" fill="white"/>
  <circle cx="450" cy="110" r="3" fill="white"/>
  <circle cx="680" cy="85" r="3" fill="white"/>
  <circle cx="130" cy="115" r="3" fill="white"/>

  <!-- Snow on cat's back/head -->
  <ellipse cx="395" cy="185" rx="45" ry="15" fill="white" opacity="0.95"/>

  <!-- Cat body - puffed up in snow, partially buried -->
  <ellipse cx="390" cy="345" rx="130" ry="80" fill="#FF7A2F" stroke="#222" stroke-width="4"/>
  <!-- Snow covering lower body -->
  <ellipse cx="390" cy="400" rx="145" ry="42" fill="white"/>

  <!-- Cat head -->
  <circle cx="390" cy="205" r="90" fill="#FF7A2F" stroke="#222" stroke-width="4"/>

  <!-- Snow on head -->
  <ellipse cx="390" cy="130" rx="55" ry="18" fill="white"/>
  <!-- Snow drooping sides -->
  <path d="M340 130 Q320 150 315 175" stroke="white" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M440 130 Q460 150 465 175" stroke="white" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Ears -->
  <polygon points="315,158 332,102 368,158" fill="#FF7A2F" stroke="#222" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="412,158 448,102 465,158" fill="#FF7A2F" stroke="#222" stroke-width="4" stroke-linejoin="round"/>
  <!-- Inner ears -->
  <polygon points="324,152 336,114 362,152" fill="#FF4444"/>
  <polygon points="418,152 444,114 458,152" fill="#FF4444"/>

  <!-- Eyes - surprised at snow -->
  <ellipse cx="355" cy="200" rx="24" ry="26" fill="#FFD700" stroke="#222" stroke-width="3"/>
  <ellipse cx="425" cy="200" rx="24" ry="26" fill="#FFD700" stroke="#222" stroke-width="3"/>
  <circle cx="360" cy="202" r="14" fill="#111"/>
  <circle cx="430" cy="202" r="14" fill="#111"/>
  <circle cx="365" cy="196" r="5" fill="white"/>
  <circle cx="435" cy="196" r="5" fill="white"/>

  <!-- Nose -->
  <ellipse cx="390" cy="226" rx="11" ry="8" fill="#FF4488"/>
  <!-- Unhappy cold mouth -->
  <path d="M380 238 Q390 232 400 238" stroke="#222" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="310" y1="222" x2="376" y2="228" stroke="#444" stroke-width="2.5"/>
  <line x1="308" y1="234" x2="376" y2="233" stroke="#444" stroke-width="2.5"/>
  <line x1="404" y1="228" x2="470" y2="222" stroke="#444" stroke-width="2.5"/>
  <line x1="404" y1="233" x2="472" y2="234" stroke="#444" stroke-width="2.5"/>

  <!-- Snow dot on nose -->
  <circle cx="390" cy="218" r="5" fill="white"/>
</svg>
