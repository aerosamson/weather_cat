<svg viewBox="0 0 800 480" width="800" height="480" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark stormy sky -->
  <rect width="800" height="480" fill="#2A2D3A"/>

  <!-- Storm clouds - dark layered -->
  <ellipse cx="180" cy="95" rx="160" ry="80" fill="#1A1D28"/>
  <ellipse cx="320" cy="75" rx="140" ry="75" fill="#1E2130"/>
  <ellipse cx="100" cy="115" rx="120" ry="60" fill="#1A1D28"/>
  <ellipse cx="430" cy="85" rx="150" ry="75" fill="#1E2130"/>
  <ellipse cx="600" cy="80" rx="145" ry="75" fill="#1A1D28"/>
  <ellipse cx="720" cy="95" rx="120" ry="65" fill="#1E2130"/>
  <ellipse cx="550" cy="110" rx="110" ry="58" fill="#1A1D28"/>

  <!-- Lightning bolt 1 (left) -->
  <polygon points="165,115 140,210 160,210 130,305" fill="#FFEE00" stroke="#FFD700" stroke-width="2" stroke-linejoin="round"/>

  <!-- Lightning bolt 2 (right) -->
  <polygon points="620,105 600,185 618,185 595,280" fill="#FFEE00" stroke="#FFD700" stroke-width="2" stroke-linejoin="round"/>

  <!-- Lightning glow -->
  <ellipse cx="148" cy="215" rx="30" ry="12" fill="#FFEE00" opacity="0.15"/>
  <ellipse cx="606" cy="195" rx="28" ry="10" fill="#FFEE00" opacity="0.15"/>

  <!-- Heavy rain streaks -->
  <g stroke="#5577AA" stroke-width="2" stroke-linecap="round" opacity="0.9">
    <line x1="55" y1="150" x2="38" y2="260"/>
    <line x1="95" y1="160" x2="78" y2="270"/>
    <line x1="220" y1="145" x2="203" y2="255"/>
    <line x1="260" y1="155" x2="243" y2="265"/>
    <line x1="300" y1="145" x2="283" y2="255"/>
    <line x1="340" y1="160" x2="323" y2="270"/>
    <line x1="380" y1="148" x2="363" y2="258"/>
    <line x1="440" y1="155" x2="423" y2="265"/>
    <line x1="480" y1="145" x2="463" y2="255"/>
    <line x1="520" y1="160" x2="503" y2="270"/>
    <line x1="660" y1="150" x2="643" y2="260"/>
    <line x1="700" y1="145" x2="683" y2="255"/>
    <line x1="740" y1="155" x2="723" y2="265"/>
    <line x1="780" y1="148" x2="763" y2="258"/>
    <!-- Rain second layer -->
    <line x1="70" y1="280" x2="53" y2="390"/>
    <line x1="240" y1="285" x2="223" y2="395"/>
    <line x1="430" y1="280" x2="413" y2="390"/>
    <line x1="550" y1="285" x2="533" y2="395"/>
    <line x1="680" y1="280" x2="663" y2="390"/>
    <line x1="750" y1="285" x2="733" y2="395"/>
  </g>

  <!-- Ground puddles - dark -->
  <rect x="0" y="410" width="800" height="70" fill="#1A2030"/>
  <ellipse cx="200" cy="414" rx="110" ry="14" fill="#141820"/>
  <ellipse cx="600" cy="416" rx="130" ry="15" fill="#141820"/>
  <!-- Lightning reflected in puddles -->
  <ellipse cx="200" cy="414" rx="50" ry="6" fill="#FFEE00" opacity="0.1"/>
  <ellipse cx="600" cy="416" rx="60" ry="7" fill="#FFEE00" opacity="0.1"/>

  <!-- Cat body - terrified, puffed up huge -->
  <ellipse cx="395" cy="330" rx="140" ry="100" fill="#FF7A2F" stroke="#222" stroke-width="4"/>
  <!-- Cat head -->
  <circle cx="395" cy="195" r="92" fill="#FF7A2F" stroke="#222" stroke-width="4"/>

  <!-- VERY puffy fur from fright -->
  <!-- Fur spikes around head -->
  <polygon points="395,96 405,115 385,115" fill="#FF7A2F"/>
  <polygon points="330,118 342,138 325,142" fill="#FF7A2F"/>
  <polygon points="460,118 475,142 458,138" fill="#FF7A2F"/>
  <polygon points="300,160 315,178 298,183" fill="#FF7A2F"/>
  <polygon points="490,160 492,183 475,178" fill="#FF7A2F"/>
  <polygon points="310,100 325,122 308,125" fill="#FF7A2F"/>
  <polygon points="480,100 482,125 465,122" fill="#FF7A2F"/>

  <!-- Ears - pinned back scared -->
  <polygon points="320,155 326,104 358,155" fill="#FF7A2F" stroke="#222" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="432,155 464,104 470,155" fill="#FF7A2F" stroke="#222" stroke-width="4" stroke-linejoin="round"/>
  <!-- Inner ears -->
  <polygon points="328,150 333,115 354,150" fill="#FF4444"/>
  <polygon points="438,150 462,115 465,150" fill="#FF4444"/>

  <!-- Eyes - wide with terror -->
  <ellipse cx="350" cy="192" rx="28" ry="32" fill="#FFD700" stroke="#222" stroke-width="3.5"/>
  <ellipse cx="440" cy="192" rx="28" ry="32" fill="#FFD700" stroke="#222" stroke-width="3.5"/>
  <circle cx="354" cy="195" r="20" fill="#111"/>
  <circle cx="444" cy="195" r="20" fill="#111"/>
  <circle cx="360" cy="188" r="7" fill="white"/>
  <circle cx="450" cy="188" r="7" fill="white"/>

  <!-- Nose -->
  <ellipse cx="395" cy="228" rx="11" ry="8" fill="#FF4488"/>
  <!-- Open mouth scared -->
  <path d="M375 242 Q395 260 415 242" stroke="#222" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Inner mouth -->
  <path d="M378 245 Q395 258 412 245" fill="#DD2222"/>
  <!-- Teeth -->
  <rect x="383" y="244" width="8" height="10" rx="2" fill="white"/>
  <rect x="399" y="244" width="8" height="10" rx="2" fill="white"/>

  <!-- Whiskers blown sideways by wind -->
  <line x1="308" y1="225" x2="372" y2="228" stroke="#444" stroke-width="2.5" transform="rotate(-10, 340, 225)"/>
  <line x1="305" y1="238" x2="372" y2="235" stroke="#444" stroke-width="2.5" transform="rotate(5, 338, 238)"/>
  <line x1="418" y1="228" x2="482" y2="225" stroke="#444" stroke-width="2.5" transform="rotate(10, 450, 225)"/>
  <line x1="418" y1="235" x2="485" y2="238" stroke="#444" stroke-width="2.5" transform="rotate(-5, 452, 238)"/>

  <!-- Fur standing up on back -->
  <path d="M280 330 Q270 310 285 290" stroke="#FF7A2F" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M510 330 Q522 310 505 290" stroke="#FF7A2F" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Front paws gripping ground -->
  <ellipse cx="328" cy="408" rx="34" ry="18" fill="#FF7A2F" stroke="#222" stroke-width="3"/>
  <ellipse cx="462" cy="408" rx="34" ry="18" fill="#FF7A2F" stroke="#222" stroke-width="3"/>
  <!-- Claws extended! -->
  <line x1="315" y1="418" x2="310" y2="430" stroke="#222" stroke-width="2.5"/>
  <line x1="328" y1="422" x2="328" y2="434" stroke="#222" stroke-width="2.5"/>
  <line x1="341" y1="418" x2="346" y2="430" stroke="#222" stroke-width="2.5"/>
  <line x1="449" y1="418" x2="444" y2="430" stroke="#222" stroke-width="2.5"/>
  <line x1="462" y1="422" x2="462" y2="434" stroke="#222" stroke-width="2.5"/>
  <line x1="475" y1="418" x2="480" y2="430" stroke="#222" stroke-width="2.5"/>

  <!-- Tail blown up by wind -->
  <path d="M520 340 Q600 270 620 200 Q625 175 640 165" stroke="#FF7A2F" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Tail fur puffed -->
  <ellipse cx="640" cy="165" rx="22" ry="22" fill="#FF7A2F" stroke="#222" stroke-width="3"/>
</svg>
